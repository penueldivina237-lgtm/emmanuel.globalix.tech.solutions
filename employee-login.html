<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globalix Employee Access</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#050505;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:-1;
      overflow:hidden;
    }

    .glow{
      position:absolute;
      border-radius:999px;
      filter:blur(120px);
    }

    .g1{
      width:500px;
      height:500px;
      background:rgba(255,204,0,0.12);
      top:-120px;
      left:-120px;
    }

    .g2{
      width:500px;
      height:500px;
      background:rgba(0,119,255,0.14);
      bottom:-120px;
      right:-120px;
    }

    .wrapper{
      width:100%;
      max-width:1300px;
    }

    .top{
      text-align:center;
      margin-bottom:60px;
    }

    .top h1{
      font-size:72px;
      font-weight:900;
      margin-bottom:18px;
    }

    .gold{
      color:#facc15;
    }

    .top p{
      color:#aaa;
      font-size:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:28px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:32px;
      padding:35px;
      backdrop-filter:blur(20px);
      transition:0.35s;
      cursor:pointer;
      position:relative;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-8px) scale(1.02);
      border-color:rgba(250,204,21,0.3);
    }

    .icon{
      width:75px;
      height:75px;
      border-radius:24px;
      background:linear-gradient(to bottom right,#facc15,#f59e0b);
      margin-bottom:25px;
    }

    .card h3{
      font-size:28px;
      margin-bottom:14px;
    }

    .card p{
      color:#aaa;
      line-height:1.8;
      margin-bottom:25px;
    }

    .enter{
      background:#facc15;
      color:black;
      border:none;
      padding:14px 22px;
      border-radius:16px;
      font-weight:800;
      cursor:pointer;
      transition:0.3s;
    }

    .enter:hover{
      transform:scale(1.04);
    }

    .tag{
      position:absolute;
      top:20px;
      right:20px;
      background:rgba(250,204,21,0.12);
      color:#facc15;
      border:1px solid rgba(250,204,21,0.2);
      padding:8px 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    @media(max-width:700px){

      .top h1{
        font-size:48px;
      }

    }

  </style>
</head>
<body>

  <div class="bg">
    <div class="glow g1"></div>
    <div class="glow g2"></div>
  </div>

  <div class="wrapper">

    <div class="top">

      <h1>
        Employee <span class="gold">Access Portal</span>
      </h1>

      <p>
        Select your role to enter the Globalix employee dashboard.
      </p>

    </div>


    <div style="display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 40px;">
      <label for="role-select" style="font-size: 20px; color: #facc15; font-weight: 600;">Select Role</label>
      <select id="role-select" style="padding: 14px 22px; border-radius: 16px; font-size: 18px; min-width: 260px;">
        <option value="">-- Choose your role --</option>
        <option value="webdev">Web Developer</option>
        <option value="designer">Graphic Designer</option>
        <option value="marketing">Digital Marketer</option>
        <option value="sales">Sales Team</option>
        <option value="admin">Management</option>
        <option value="support">IT Support</option>
      </select>
      <button class="enter" id="enter-dashboard-btn">Enter Dashboard</button>
      <script>
        document.getElementById('enter-dashboard-btn').onclick = function() {
          var role = document.getElementById('role-select').value;
          var map = {
            webdev: 'auth.html?dashboard=webdev',
            designer: 'auth.html?dashboard=designer',
            marketing: 'auth.html?dashboard=marketing',
            sales: 'auth.html?dashboard=sales',
            admin: 'auth.html?dashboard=admin',
            support: 'auth.html?dashboard=support'
          };
          if (map[role]) {
            window.location.href = map[role];
          } else {
            alert('Please select your role.');
          }
        };
      </script>
    </div>

  </div>

</body>
</html>
