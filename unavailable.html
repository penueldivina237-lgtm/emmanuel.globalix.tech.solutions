<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Not Authorized</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#050505;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }

    .bg{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:-1;
    }

    .glow{
      position:absolute;
      border-radius:999px;
      filter:blur(120px);
    }

    .g1{
      width:450px;
      height:450px;
      background:rgba(255,204,0,0.12);
      top:-120px;
      left:-120px;
    }

    .g2{
      width:450px;
      height:450px;
      background:rgba(0,119,255,0.14);
      bottom:-120px;
      right:-120px;
    }

    .container{
      width:90%;
      max-width:700px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      border-radius:40px;
      padding:60px;
      text-align:center;
      animation:fadeUp 1s ease;
    }

    .icon{
      width:120px;
      height:120px;
      margin:auto;
      border-radius:30px;
      background:linear-gradient(to bottom right,#facc15,#f59e0b);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:60px;
      color:black;
      font-weight:900;
      margin-bottom:35px;
      box-shadow:0 20px 60px rgba(250,204,21,0.25);
    }

    h1{
      font-size:64px;
      font-weight:900;
      margin-bottom:20px;
    }

    .gold{
      color:#facc15;
    }

    p{
      color:#a1a1aa;
      font-size:18px;
      line-height:1.9;
      margin-bottom:40px;
    }

    .btns{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .btn{
      padding:18px 28px;
      border-radius:18px;
      border:none;
      cursor:pointer;
      font-weight:800;
      transition:0.3s;
      font-size:16px;
      text-decoration:none;
    }

    .primary{
      background:#facc15;
      color:black;
    }

    .secondary{
      background:rgba(255,255,255,0.06);
      color:white;
      border:1px solid rgba(255,255,255,0.08);
    }

    .btn:hover{
      transform:translateY(-3px) scale(1.03);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:700px){

      .container{
        padding:40px 25px;
      }

      h1{
        font-size:42px;
      }

      p{
        font-size:16px;
      }

    }

  </style>
</head>
<body>

  <div class="bg">
    <div class="glow g1"></div>
    <div class="glow g2"></div>
  </div>

  <div class="container">

    <div class="icon">
      !
    </div>

    <h1>
      Not <span class="gold">Authorized</span>
    </h1>

    <p>
      You do not have permission to access this page or dashboard.
      Please contact the administrator of Emmanuel Globalix Tech Solutions
      if you believe this is an error.
    </p>

    <div class="btns">

      <a href="index.html" class="btn primary">
        Return Home
      </a>

      <a href="employee-login.html" class="btn secondary">
        Employee Portal
      </a>

    </div>

  </div>

</body>
</html>
